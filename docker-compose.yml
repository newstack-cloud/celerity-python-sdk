name: celerity-python-sdk-integration

services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:4.4
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ssm,secretsmanager,s3,sqs,sns,dynamodb
      - DEBUG=0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:4566/_localstack/health | python3 -c 'import sys,json; s=json.load(sys.stdin).get(\"services\",{}); exit(0 if s and \"starting\" not in s.values() else 1)'",
        ]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    ports:
      - "5499:5432"
    environment:
      POSTGRES_USER: celerity_test
      POSTGRES_PASSWORD: celerity_test
      POSTGRES_DB: celerity_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celerity_test"]
      interval: 2s
      timeout: 5s
      retries: 5
