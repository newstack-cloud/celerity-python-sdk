sonar.projectKey=newstack-cloud_celerity-python-sdk
sonar.organization=newstack-cloud
sonar.projectName=Celerity Python SDK

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.inclusions=src/celerity/**/*.py
sonar.test.inclusions=tests/**/*.py

# Exclusions from analysis
sonar.exclusions=\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.egg-info/**,\
  **/coverage/**

# Coverage (Cobertura XML from pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Ruff lint report (JSON)
sonar.python.ruff.reportPaths=ruff-report.json

sonar.sourceEncoding=UTF-8
